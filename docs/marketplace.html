<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace — Shellfire Extensions</title>
<meta name="description" content="Browse 100+ extensions for Shellfire: themes, commands, status bar widgets, and full extensions. Customize your terminal experience.">
<meta name="theme-color" content="#06060e">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#06060e;--bg-primary:#0e0e1a;--bg-card:#111122;--bg-card-hover:#161632;
  --accent:#00f0ff;--accent-dim:#00a8b3;--accent-glow:rgba(0,240,255,0.25);
  --green:#00e676;--purple:#a78bfa;--orange:#ff9f43;--pink:#ff6b9d;
  --text:#e8eaf0;--text-muted:#7b8db0;--text-dim:#4a5578;
  --glass:rgba(14,14,30,0.7);--glass-border:rgba(0,240,255,0.1);
  --radius:16px;--radius-sm:10px;
  --font-sans:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono','Fira Code',monospace;
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-sans);background:var(--bg-deep);color:var(--text);line-height:1.6;overflow-x:hidden}
a{color:var(--accent);text-decoration:none;transition:color .2s}
a:hover{color:#66f7ff}
::selection{background:rgba(0,240,255,0.3)}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* Grid bg */
.grid-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:linear-gradient(rgba(0,240,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.03) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;z-index:0;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,black 20%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,black 20%,transparent 70%);
}

/* Nav */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(6,6,14,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.04);
}
nav .inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:14px 24px}
nav .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;color:#fff}
nav .logo svg{width:30px;height:30px}
nav .links{display:flex;align-items:center;gap:24px}
nav .links a{color:var(--text-muted);font-size:.88rem;font-weight:500;transition:color .2s}
nav .links a:hover{color:#fff}
nav .links .btn-nav{background:var(--accent);color:#0a0a14;padding:8px 20px;border-radius:8px;font-weight:600;font-size:.85rem;transition:transform .2s,box-shadow .2s}
nav .links .btn-nav:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-glow);color:#0a0a14}

/* Hero */
.mp-hero{
  padding:120px 24px 48px;text-align:center;position:relative;
}
.mp-hero::before{
  content:'';position:absolute;top:30%;left:50%;width:900px;height:500px;
  background:radial-gradient(circle,rgba(0,240,255,0.06) 0%,transparent 65%);
  transform:translate(-50%,-50%);pointer-events:none;
}
.mp-hero h1{
  font-size:clamp(2.2rem,5vw,3.8rem);font-weight:900;letter-spacing:-.03em;
  line-height:1.1;margin-bottom:16px;position:relative;
}
.mp-hero h1 .gradient{
  background:linear-gradient(135deg,#fff 0%,#00f0ff 60%,#00b8d4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.mp-hero p{font-size:1.1rem;color:var(--text-muted);max-width:560px;margin:0 auto 32px;position:relative}

/* Stats */
.mp-stats{
  display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin-bottom:40px;position:relative;
}
.mp-stat{
  background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;
  padding:16px 28px;text-align:center;backdrop-filter:blur(12px);
}
.mp-stat-num{font-size:1.8rem;font-weight:800;color:var(--accent);line-height:1}
.mp-stat-label{font-size:.78rem;color:var(--text-dim);margin-top:4px;font-weight:500}

/* Container */
.container{max-width:1200px;margin:0 auto;padding:0 24px;position:relative}

/* Search & filters */
.mp-controls{
  position:sticky;top:58px;z-index:50;
  background:rgba(6,6,14,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.04);margin-bottom:24px;
}
.mp-search-row{display:flex;gap:12px;align-items:center;max-width:1200px;margin:0 auto;padding:0 24px}
.mp-search-wrap{position:relative;flex:1}
.mp-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
#mp-search{
  width:100%;padding:12px 16px 12px 44px;border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;background:rgba(255,255,255,0.04);color:var(--text);font-size:14px;
  outline:none;transition:border-color .15s;font-family:var(--font-sans);
}
#mp-search:focus{border-color:var(--accent)}
#mp-search::placeholder{color:var(--text-dim)}
.mp-sort{
  padding:10px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);color:var(--text-muted);font-size:13px;
  font-family:var(--font-sans);outline:none;cursor:pointer;
}
.mp-filters{
  display:flex;gap:8px;flex-wrap:wrap;max-width:1200px;margin:12px auto 0;padding:0 24px;
}
.mp-pill{
  font-size:12px;font-weight:600;padding:6px 16px;border-radius:100px;
  border:1px solid rgba(255,255,255,0.08);background:transparent;
  color:var(--text-muted);cursor:pointer;transition:all .15s;white-space:nowrap;
}
.mp-pill:hover{border-color:var(--accent);color:var(--text)}
.mp-pill.active{background:var(--accent);color:#0a0a14;border-color:var(--accent)}
.mp-pill .pill-count{
  font-size:10px;opacity:.7;margin-left:4px;font-weight:500;
}

/* Grid */
.mp-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:14px;padding-bottom:80px;
}
@media(max-width:700px){.mp-grid{grid-template-columns:1fr}}

/* Card */
.mp-card{
  background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);
  padding:20px;display:flex;flex-direction:column;gap:10px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:all .25s ease;position:relative;overflow:hidden;
}
.mp-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;transition:opacity .25s;
}
.mp-card:hover{
  transform:translateY(-4px);border-color:rgba(0,240,255,0.25);
  box-shadow:0 16px 48px rgba(0,0,0,0.4),0 0 0 1px rgba(0,240,255,0.1);
  background:var(--bg-card-hover);
}
.mp-card:hover::before{opacity:1}
.mp-card.featured{border-color:rgba(0,240,255,0.2)}
.mp-card-top{display:flex;align-items:flex-start;gap:12px}
.mp-card-icon{
  font-size:28px;line-height:1;flex-shrink:0;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;border-radius:12px;
  background:rgba(0,240,255,0.06);
}
.mp-card-info{flex:1;min-width:0}
.mp-card-name{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-card-author{font-size:11px;color:var(--text-dim);margin-top:2px}
.mp-card-featured-badge{
  position:absolute;top:12px;right:12px;font-size:9px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;
  background:rgba(0,240,255,0.12);color:var(--accent);
}
.mp-card-desc{
  font-size:12px;color:var(--text-muted);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  flex:1;
}
.mp-card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto}
.mp-card-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1;min-width:0}
.mp-tag{
  font-size:10px;font-weight:500;padding:3px 8px;border-radius:6px;white-space:nowrap;
}
.mp-tag.type-theme{background:rgba(167,139,250,0.12);color:#a78bfa}
.mp-tag.type-command{background:rgba(0,230,118,0.1);color:#00e676}
.mp-tag.type-statusbar{background:rgba(255,159,67,0.1);color:#ff9f43}
.mp-tag.type-extension{background:rgba(0,240,255,0.1);color:var(--accent)}
.mp-tag.subtle{background:rgba(255,255,255,0.05);color:var(--text-dim)}

/* Theme preview */
.mp-preview{display:flex;gap:3px;margin-top:6px}
.mp-swatch{width:16px;height:16px;border-radius:4px;border:1px solid rgba(255,255,255,0.06)}

/* Install hint */
.mp-download-btn{
  font-size:11px;font-weight:600;padding:6px 16px;border-radius:8px;
  background:var(--accent);color:#0a0a14;border:none;
  white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s;
  display:inline-flex;align-items:center;gap:5px;text-decoration:none;
}
.mp-download-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--accent-glow);color:#0a0a14}
.mp-download-btn svg{flex-shrink:0}

/* Empty */
.mp-empty{
  grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-dim);
}
.mp-empty svg{margin-bottom:12px;opacity:.3}
.mp-empty p{font-size:14px}

/* Loading */
.mp-loading{grid-column:1/-1;text-align:center;padding:80px 20px}
.mp-spinner{
  width:32px;height:32px;border:2px solid rgba(255,255,255,0.06);
  border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
footer{
  background:var(--bg-primary);border-top:1px solid rgba(255,255,255,0.04);
  padding:32px 24px;text-align:center;
}
footer p{font-size:.82rem;color:var(--text-dim)}
footer a{color:var(--text-muted)}
footer a:hover{color:#fff}
</style>
</head>
<body>

<div class="grid-bg"></div>

<nav>
  <div class="inner">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 512 512" width="30" height="30">
        <defs><linearGradient id="ng" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f0f1e"/></linearGradient></defs>
        <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#ng)" stroke="rgba(0,240,255,0.15)" stroke-width="4"/>
        <rect x="128" y="148" width="256" height="6" rx="3" fill="#00f0ff"/>
        <rect x="253" y="148" width="6" height="220" rx="3" fill="#00f0ff"/>
        <rect x="240" y="340" width="32" height="6" rx="2" fill="#00f0ff" opacity="0.9"/>
      </svg>
      Shellfire
    </a>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="index.html#features">Features</a>
      <a href="builder/">Builder</a>
      <a href="index.html#install">Install</a>
      <a href="https://github.com/suvash-glitch/Shellfire" class="btn-nav">GitHub</a>
    </div>
  </div>
</nav>

<div class="mp-hero">
  <h1>Extension <span class="gradient">Marketplace</span></h1>
  <p>100 extensions to customize your Shellfire experience. Themes, commands, widgets, and powerful add-ons.</p>
  <div class="mp-stats">
    <div class="mp-stat"><div class="mp-stat-num" id="stat-total">--</div><div class="mp-stat-label">Extensions</div></div>
    <div class="mp-stat"><div class="mp-stat-num" id="stat-themes">--</div><div class="mp-stat-label">Themes</div></div>
    <div class="mp-stat"><div class="mp-stat-num" id="stat-extensions">--</div><div class="mp-stat-label">Add-ons</div></div>
    <div class="mp-stat"><div class="mp-stat-num" id="stat-commands">--</div><div class="mp-stat-label">Commands</div></div>
  </div>
</div>

<div class="mp-controls">
  <div class="mp-search-row">
    <div class="mp-search-wrap">
      <svg class="mp-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="mp-search" placeholder="Search extensions, themes, commands..." autofocus>
    </div>
    <select class="mp-sort" id="mp-sort">
      <option value="featured">Featured first</option>
      <option value="name">Alphabetical</option>
      <option value="type">By type</option>
    </select>
  </div>
  <div class="mp-filters" id="mp-filters">
    <button class="mp-pill active" data-filter="all">All<span class="pill-count"></span></button>
    <button class="mp-pill" data-filter="featured">Featured</button>
    <button class="mp-pill" data-filter="theme">Themes<span class="pill-count"></span></button>
    <button class="mp-pill" data-filter="extension">Extensions<span class="pill-count"></span></button>
    <button class="mp-pill" data-filter="command">Commands<span class="pill-count"></span></button>
    <button class="mp-pill" data-filter="statusbar">Status Bar<span class="pill-count"></span></button>
  </div>
</div>

<div class="container">
  <div class="mp-grid" id="mp-grid">
    <div class="mp-loading"><div class="mp-spinner"></div><p style="color:var(--text-dim);font-size:13px">Loading extensions...</p></div>
  </div>
</div>

<footer>
  <p><a href="index.html">Shellfire</a> &mdash; AI-Powered Terminal Multiplexer &middot; <a href="https://github.com/suvash-glitch/Shellfire">GitHub</a></p>
</footer>

<script>
(function(){
  var REGISTRY_URL = "https://raw.githubusercontent.com/suvash-glitch/Shellfire/main/registry/plugins.json";
  var LOCAL_URL = "../registry/plugins.json";
  var grid = document.getElementById("mp-grid");
  var searchEl = document.getElementById("mp-search");
  var sortEl = document.getElementById("mp-sort");
  var filtersEl = document.getElementById("mp-filters");
  var plugins = [];
  var activeFilter = "all";

  var TYPE_LABELS = {theme:"Theme",command:"Command",statusbar:"Status Bar",extension:"Extension"};

  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function renderCard(p){
    var typeClass = "type-" + (p.type || "extension");
    var card = '<div class="mp-card' + (p.featured ? ' featured' : '') + '"'
      + ' data-type="' + esc(p.type || "") + '"'
      + ' data-name="' + esc((p.name||"").toLowerCase()) + '"'
      + ' data-desc="' + esc((p.description||"").toLowerCase()) + '"'
      + ' data-tags="' + esc((p.tags||[]).join(" ").toLowerCase()) + '"'
      + ' data-id="' + esc(p.id) + '"'
      + ' data-featured="' + (p.featured?"1":"0") + '">';
    if(p.featured) card += '<div class="mp-card-featured-badge">Featured</div>';
    card += '<div class="mp-card-top">';
    card += '<div class="mp-card-icon">' + (p.icon||"\uD83D\uDCE6") + '</div>';
    card += '<div class="mp-card-info">';
    card += '<div class="mp-card-name">' + esc(p.name||p.id) + '</div>';
    card += '<div class="mp-card-author">' + esc(p.author||"Shellfire") + ' &middot; v' + esc(p.version||"1.0.0") + '</div>';
    card += '</div></div>';
    card += '<div class="mp-card-desc">' + esc(p.description||"") + '</div>';
    if(p.type === "theme" && p.preview && p.preview.length){
      card += '<div class="mp-preview">';
      for(var i=0;i<p.preview.length;i++) card += '<div class="mp-swatch" style="background:'+esc(p.preview[i])+'"></div>';
      card += '</div>';
    }
    card += '<div class="mp-card-footer"><div class="mp-card-tags">';
    card += '<span class="mp-tag '+typeClass+'">' + esc(TYPE_LABELS[p.type]||p.type||"") + '</span>';
    if(p.tags){for(var j=0;j<Math.min(p.tags.length,2);j++) card += '<span class="mp-tag subtle">' + esc(p.tags[j]) + '</span>';}
    card += '</div>';
    var pkgUrl = p.packageUrl || ("https://raw.githubusercontent.com/suvash-glitch/Shellfire/main/registry/packages/"+esc(p.id)+".termext");
    card += '<a class="mp-download-btn" href="'+pkgUrl+'" download="'+esc(p.id)+'.termext" title="Download .termext package"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</a>';
    card += '</div></div>';
    return card;
  }

  function sortPlugins(list, mode){
    var sorted = list.slice();
    if(mode==="name") sorted.sort(function(a,b){return (a.name||a.id).localeCompare(b.name||b.id);});
    else if(mode==="type") sorted.sort(function(a,b){return (a.type||"").localeCompare(b.type||"")||(a.name||"").localeCompare(b.name||"");});
    else sorted.sort(function(a,b){if(a.featured&&!b.featured)return -1;if(!a.featured&&b.featured)return 1;return (a.name||a.id).localeCompare(b.name||b.id);});
    return sorted;
  }

  function render(){
    var q = (searchEl.value||"").toLowerCase().trim();
    var sortMode = sortEl.value;
    var filtered = plugins.filter(function(p){
      if(activeFilter!=="all"){
        if(activeFilter==="featured"&&!p.featured) return false;
        if(activeFilter!=="featured"&&p.type!==activeFilter) return false;
      }
      if(q){
        var hay = (p.name||"")+" "+(p.description||"")+" "+(p.id||"")+" "+(p.tags||[]).join(" ");
        if(hay.toLowerCase().indexOf(q)===-1) return false;
      }
      return true;
    });
    var sorted = sortPlugins(filtered, sortMode);
    if(sorted.length===0){
      grid.innerHTML = '<div class="mp-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No extensions match your search</p></div>';
    } else {
      var html = "";
      for(var i=0;i<sorted.length;i++) html += renderCard(sorted[i]);
      grid.innerHTML = html;
    }
  }

  function updateStats(){
    var types = {};
    plugins.forEach(function(p){types[p.type]=(types[p.type]||0)+1;});
    document.getElementById("stat-total").textContent = plugins.length;
    document.getElementById("stat-themes").textContent = types.theme||0;
    document.getElementById("stat-extensions").textContent = (types.extension||0);
    document.getElementById("stat-commands").textContent = (types.command||0)+(types.statusbar||0);
    // Update pill counts
    filtersEl.querySelector('[data-filter="all"] .pill-count').textContent = " ("+plugins.length+")";
    filtersEl.querySelector('[data-filter="theme"] .pill-count').textContent = " ("+(types.theme||0)+")";
    filtersEl.querySelector('[data-filter="extension"] .pill-count').textContent = " ("+(types.extension||0)+")";
    filtersEl.querySelector('[data-filter="command"] .pill-count').textContent = " ("+(types.command||0)+")";
    filtersEl.querySelector('[data-filter="statusbar"] .pill-count').textContent = " ("+(types.statusbar||0)+")";
  }

  function load(url, fallback){
    fetch(url).then(function(r){
      if(!r.ok) throw new Error(r.status);
      return r.json();
    }).then(function(data){
      plugins = data.plugins || [];
      updateStats();
      render();
    }).catch(function(){
      if(fallback){
        load(fallback, null);
      } else {
        grid.innerHTML = '<div class="mp-empty"><p>Could not load extensions registry.</p></div>';
      }
    });
  }

  // Events
  var debounce;
  searchEl.addEventListener("input", function(){clearTimeout(debounce);debounce=setTimeout(render,150);});
  sortEl.addEventListener("change", render);
  filtersEl.addEventListener("click", function(e){
    var pill = e.target.closest(".mp-pill");
    if(!pill) return;
    filtersEl.querySelectorAll(".mp-pill").forEach(function(b){b.classList.remove("active");});
    pill.classList.add("active");
    activeFilter = pill.dataset.filter;
    render();
  });

  // Load registry (try remote first, fall back to local)
  load(REGISTRY_URL, LOCAL_URL);
})();
</script>
</body>
</html>
