<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#00b8d4"/>
    </linearGradient>
  </defs>

  <!-- Rounded rectangle background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle top shine overlay -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="rgba(0,240,255,0.1)" stroke-width="1.5"/>

  <!-- Stylized "T" formed by terminal grid lines -->
  <!-- Horizontal bar of the T -->
  <rect x="128" y="148" width="256" height="6" rx="3" fill="url(#accent)"/>

  <!-- Vertical stem of the T -->
  <rect x="253" y="148" width="6" height="220" rx="3" fill="url(#accent)"/>

  <!-- Terminal cursor block blinking at the bottom of the T stem -->
  <rect x="240" y="340" width="32" height="6" rx="2" fill="#00f0ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtle grid dots suggesting terminal grid (left of T) -->
  <circle cx="152" cy="200" r="2" fill="rgba(0,240,255,0.15)"/>
  <circle cx="152" cy="228" r="2" fill="rgba(0,240,255,0.1)"/>
  <circle cx="152" cy="256" r="2" fill="rgba(0,240,255,0.08)"/>
  <circle cx="180" cy="200" r="2" fill="rgba(0,240,255,0.12)"/>
  <circle cx="180" cy="228" r="2" fill="rgba(0,240,255,0.08)"/>

  <!-- Subtle grid dots (right of T) -->
  <circle cx="360" cy="200" r="2" fill="rgba(0,240,255,0.15)"/>
  <circle cx="360" cy="228" r="2" fill="rgba(0,240,255,0.1)"/>
  <circle cx="360" cy="256" r="2" fill="rgba(0,240,255,0.08)"/>
  <circle cx="332" cy="200" r="2" fill="rgba(0,240,255,0.12)"/>
  <circle cx="332" cy="228" r="2" fill="rgba(0,240,255,0.08)"/>
</svg>
