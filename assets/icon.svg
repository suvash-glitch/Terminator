<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#1a1a38"/>
      <stop offset="100%" stop-color="#08081a"/>
    </linearGradient>

    <!-- Accent: cyan to electric blue -->
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#448aff"/>
    </linearGradient>

    <!-- Secondary accent for the fork -->
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#448aff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>

    <!-- Glass shine -->
    <linearGradient id="shine" x1="0.5" y1="0" x2="0.5" y2="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Center glow -->
    <radialGradient id="glow" cx="0.42" cy="0.52" r="0.35">
      <stop offset="0%" stop-color="rgba(0,229,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,229,255,0)"/>
    </radialGradient>

    <!-- Chevron glow -->
    <filter id="chevGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Cursor glow -->
    <filter id="curGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#glow)"/>
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#shine)"/>

  <!-- Subtle split-pane crosshair lines (multiplexer hint) -->
  <line x1="256" y1="76" x2="256" y2="436" stroke="rgba(0,229,255,0.035)" stroke-width="1"/>
  <line x1="76" y1="256" x2="436" y2="256" stroke="rgba(0,229,255,0.035)" stroke-width="1"/>

  <!-- === MAIN CHEVRON > === -->
  <g transform="translate(220, 256)" filter="url(#chevGlow)">
    <!-- Bold terminal chevron -->
    <path d="M-60,-80 L40,0 L-60,80"
          fill="none" stroke="url(#acc)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- === MULTIPLEXER FORK: two output lines from chevron tip === -->
  <g transform="translate(220, 256)">
    <!-- Upper branch -->
    <path d="M44,-2 L100,-2 L130,-44"
          fill="none" stroke="url(#acc2)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
    <!-- Lower branch -->
    <path d="M44,2 L100,2 L130,44"
          fill="none" stroke="url(#acc2)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

    <!-- Terminal dots at branch ends -->
    <circle cx="134" cy="-48" r="6" fill="#448aff" opacity="0.45"/>
    <circle cx="134" cy="48" r="6" fill="#7c4dff" opacity="0.45"/>
  </g>

  <!-- === BLINKING CURSOR === -->
  <g filter="url(#curGlow)">
    <rect x="162" y="338" width="40" height="6" rx="3" fill="#00e5ff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Faint terminal text lines (top-left pane) -->
  <g opacity="0.045">
    <rect x="96" y="120" width="56" height="3" rx="1.5" fill="#00e5ff"/>
    <rect x="96" y="130" width="38" height="3" rx="1.5" fill="#00e5ff"/>
    <rect x="96" y="140" width="48" height="3" rx="1.5" fill="#00e5ff"/>
  </g>

  <!-- Faint terminal text lines (bottom-right pane) -->
  <g opacity="0.035">
    <rect x="300" y="350" width="52" height="3" rx="1.5" fill="#7c4dff"/>
    <rect x="300" y="360" width="40" height="3" rx="1.5" fill="#7c4dff"/>
    <rect x="300" y="370" width="60" height="3" rx="1.5" fill="#7c4dff"/>
  </g>

  <!-- Subtle outer border -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108"
        fill="none" stroke="rgba(0,229,255,0.07)" stroke-width="1.5"/>
</svg>
